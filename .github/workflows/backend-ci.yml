name: Backend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.0"
  CGO_ENABLED: "0"
  APP_ENV: test
  APP_PORT: "8080"
  APP_BASE_PATH: /api
  DB_RUN_MIGRATIONS: "false"
  JWT_SECRET: ci-test-secret-change-me
  JWT_ISSUER: devtracker-ci
  JWT_ACCESS_TOKEN_TTL: 24h

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run go fmt check
        working-directory: backend
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "The following Go files need formatting:"
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Build backend binary
        working-directory: backend
        run: |
          mkdir -p ../build
          go build -trimpath -ldflags="-s -w" -o ../build/devtracker-api ./cmd/api

      - name: Run Docker build check
        run: docker build -t devtracker-api:ci .
