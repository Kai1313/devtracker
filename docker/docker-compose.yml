version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: load_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loaddev
      POSTGRES_PASSWORD: loaddevpass
      POSTGRES_DB: loaddevdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: load_dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
