services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devtracker-api:local
    container_name: devtracker_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-DevTracker API}
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-8080}
      APP_BASE_PATH: ${APP_BASE_PATH:-/api}
      APP_BODY_LIMIT: ${APP_BODY_LIMIT:-4194304}
      APP_READ_TIMEOUT: ${APP_READ_TIMEOUT:-10s}
      APP_WRITE_TIMEOUT: ${APP_WRITE_TIMEOUT:-10s}
      APP_SHUTDOWN_TIMEOUT: ${APP_SHUTDOWN_TIMEOUT:-10s}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-devtracker}
      DB_PASSWORD: ${DB_PASSWORD:-devtrackerpass}
      DB_NAME: ${DB_NAME:-devtracker}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Jakarta}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-1h}
      DB_SLOW_THRESHOLD: ${DB_SLOW_THRESHOLD:-200ms}
      DB_RUN_MIGRATIONS: ${DB_RUN_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me-for-production}
      JWT_ISSUER: ${JWT_ISSUER:-devtracker}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-24h}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-8080}$${APP_BASE_PATH:-/api}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devtracker

  postgres:
    image: postgres:16-alpine
    container_name: devtracker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-devtracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devtrackerpass}
      POSTGRES_DB: ${DB_NAME:-devtracker}
      TZ: ${DB_TIMEZONE:-Asia/Jakarta}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devtracker

  redis:
    image: redis:7-alpine
    container_name: devtracker_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - devtracker

volumes:
  postgres_data:
  redis_data:

networks:
  devtracker:
    driver: bridge
